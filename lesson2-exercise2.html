<!DOCTYPE html>
<html>
  <head>
    <title>Product Details</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/dayjs.js">

    </script>


    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

    function ProducDetails({ name, price, discountPrice, imageSrc }) {
      return (
        <div>
          <img 
            src={imageSrc} 
            width="100"
          />

          <p>{name}</p>

          {discountPrice ? <del><p>Price: ${price}</p></del> : <p>Price: ${price}</p>}
          
          {discountPrice && (
            <p>Discount Price: ${discountPrice}</p>
          )}
          
          <button>Add to Cart</button>
        </div>
      );
    }

    function App(){
      return(
        <>
          <ProducDetails 
            name="Cotton socks" 
            price="10.90" 
            discountPrice="5.45" 
            imageSrc="cotton-socks.png"
          />
          <ProducDetails 
            name="Tennis balls" 
            price="6.00"
            imageSrc="tennis-balls.png"
          />
          <ProducDetails 
            name="Plain T-shirt" 
            price="7.99"
            imageSrc="plain-t-shirt.png"
          />
        </>
      );
    }

    const container = document.querySelector('.js-container');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    </script>
  </body>
</html>
